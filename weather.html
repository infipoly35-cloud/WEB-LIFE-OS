<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
:root{
  --leaf-primary:#2e7d32;
  --leaf-light:#a5d6a7;
  --leaf-bg:rgba(46,125,50,0.08);
}

body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:system-ui;
  background:transparent;
}

.widget{
  width:220px;
  padding:18px;
  border-radius:18px;

  background:var(--leaf-bg);
  backdrop-filter:blur(10px);

  border:1px solid rgba(46,125,50,0.2);

  box-shadow:
    0 4px 20px rgba(0,0,0,0.08);

  text-align:center;
}

.city{
  font-size:14px;
  color:var(--leaf-primary);
  margin-bottom:6px;
}

.temp{
  font-size:34px;
  font-weight:600;
  color:var(--leaf-primary);
}

.icon{
  font-size:28px;
  margin-bottom:6px;
}

.meta{
  font-size:12px;
  color:#4b6b4b;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="widget">

<div class="icon" id="icon">🍃</div>

<div class="temp" id="temp">--°</div>

<div class="city">Jagraon • Punjab</div>

<div class="meta" id="wind"></div>

</div>

<script>
async function weather(){

const res = await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=30.78&longitude=75.48&current_weather=true"
);

const data = await res.json();
const w = data.current_weather;

document.getElementById("temp").innerHTML =
Math.round(w.temperature) + "°C";

document.getElementById("wind").innerHTML =
"Wind " + w.windspeed + " km/h";

let icon="🌤";

if(w.weathercode >= 61) icon="🌧";
else if(w.weathercode >= 80) icon="⛈";
else if(w.weathercode == 0) icon="☀️";

document.getElementById("icon").innerHTML = icon;

}

weather();
</script>

</body>
</html>
