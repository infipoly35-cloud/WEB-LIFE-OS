<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden; /* removes scrollbars */
font-family:sans-serif;
background:transparent;
}

/* FULLSCREEN RESPONSIVE WIDGET */

.widget{
width:100vw;
height:100dvh; /* better than vh for responsiveness */

display:flex;
flex-direction:column;
justify-content:flex-end;

padding:clamp(16px,4vw,40px);

color:white;
position:relative;
overflow:hidden;

background-size:cover;
background-position:center;
}

/* Forest backgrounds */

.day{
background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
}

.sunset{
background-image:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
}

.night{
background-image:url("https://images.unsplash.com/photo-1470115636492-6d2b56f9146d");
}

.rain{
background-image:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
}

/* rain overlay */

.rain::before{
content:"";
position:absolute;
inset:0;
pointer-events:none;

background:repeating-linear-gradient(
transparent,
transparent 2px,
rgba(255,255,255,0.15) 3px
);

animation:rain 0.4s linear infinite;
}

@keyframes rain{
from{background-position:0 0}
to{background-position:-20px 100px}
}

/* responsive text */

.temp{
font-size:clamp(40px,8vw,90px);
font-weight:bold;
}

.city{
font-size:clamp(16px,2vw,28px);
opacity:.9;
}

</style>
</head>

<body>

<div class="widget day" id="widget">

<div class="temp" id="temp">--°C</div>
<div class="city">Jagraon • Punjab</div>

</div>

<script>

async function weather(){

const res = await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=30.78&longitude=75.48&current_weather=true"
);

const data = await res.json();
const w = data.current_weather;

document.getElementById("temp").innerHTML =
Math.round(w.temperature) + "°C";

const hour = new Date().getHours();
const widget = document.getElementById("widget");

/* time based forest */

if(hour >= 6 && hour < 17){
widget.className = "widget day";
}
else if(hour >= 17 && hour < 19){
widget.className = "widget sunset";
}
else{
widget.className = "widget night";
}

/* rain override */

if(w.weathercode >= 60){
widget.className = "widget rain";
}

}

/* run once immediately */
weather();

/* auto refresh every 10 minutes */
setInterval(weather, 600000);

</script>

</body>
</html>
